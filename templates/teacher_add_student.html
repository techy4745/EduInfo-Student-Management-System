<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | EduInfo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        .navbar{
            height:70px;
            background:#111827;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 7%;
        }

        .logo{
            font-size:26px;
            font-weight:bold;
        }

        .logo span{
            color:#38bdf8;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        .container{
            width:100%;
            display:flex;
            justify-content:center;
            padding:50px 20px;
        }

        .form-box{
            width:100%;
            max-width:650px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            color:#111827;
        }

        p{
            text-align:center;
            color:#64748b;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:13px;
            border:1px solid #cbd5e1;
            border-radius:7px;
            font-size:15px;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#0284c7;
        }

        button{
            width:100%;
            padding:14px;
            background:#0284c7;
            color:white;
            border:none;
            border-radius:7px;
            font-size:16px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#0369a1;
        }

        .message{
            background:#dcfce7;
            color:#166534;
            border:1px solid #86efac;
            padding:12px;
            border-radius:8px;
            margin-bottom:20px;
            text-align:center;
            font-weight:bold;
        }
    </style>

</head>

<body>

<nav class="navbar">

    <div class="logo">
        Edu<span>Info</span>
    </div>

    <div>
        <a href="/teacher/dashboard">Dashboard</a>
        <a href="/teacher/logout">Logout</a>
    </div>

</nav>

<div class="container">

<div class="form-box">

<h1>Add Student</h1>

<p>Teacher can register a new student.</p>

{% with messages=get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}
<div class="message">
{{message}}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<div class="form-group">
<label>Student Name</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Course</label>

<select name="course" required>

<option value="">Select Course</option>
<option>B.Tech CSE</option>
<option>B.Tech IT</option>
<option>BCA</option>
<option>MCA</option>
<option>BBA</option>

</select>

</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit">
Add Student
</button>

</form>

</div>

</div>

</body>

</html>
